[build]
  publish = "public"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/data/news.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Route /article?u=... to the serverless function for dynamic OG tags
[[redirects]]
  from = "/article"
  to = "/.netlify/functions/article"
  status = 200
