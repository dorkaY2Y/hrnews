<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.og {
  width: 1200px;
  height: 630px;
  background: #0d0d12;
  position: relative;
  display: flex;
  align-items: center;
  padding: 0 90px;
  overflow: hidden;
}

/* Subtle grid pattern */
.og::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(222,209,20,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(222,209,20,.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Gold glow top-right */
.glow-1 {
  position: absolute;
  top: -120px;
  right: -80px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(222,209,20,.12) 0%, transparent 70%);
  border-radius: 50%;
}

/* Subtle glow bottom-left */
.glow-2 {
  position: absolute;
  bottom: -150px;
  left: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(222,209,20,.06) 0%, transparent 70%);
  border-radius: 50%;
}

/* Gold accent line top */
.top-line {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent 5%, #DED114 30%, #DED114 70%, transparent 95%);
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 70px;
  width: 100%;
}

/* Logo area */
.logo-area {
  flex-shrink: 0;
  width: 180px;
  height: 180px;
  position: relative;
}

.logo-ring {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 3px solid rgba(222,209,20,.3);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(222,209,20,.05);
  box-shadow: 0 0 60px rgba(222,209,20,.1);
}

.logo-ring img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
}

/* Text content */
.text-content {
  flex: 1;
}

.brand-tag {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #DED114;
  margin-bottom: 18px;
}

.title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 72px;
  font-weight: 800;
  color: #faf8f4;
  line-height: 1.05;
  margin-bottom: 8px;
}

.title span {
  color: #DED114;
}

.tagline {
  font-size: 28px;
  font-weight: 500;
  color: #b8b2a8;
  margin-bottom: 28px;
  font-style: italic;
}

.desc {
  font-size: 18px;
  color: #7a7680;
  line-height: 1.5;
  max-width: 540px;
}

/* Bottom bar */
.bottom-bar {
  position: absolute;
  bottom: 30px;
  left: 90px;
  right: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 2;
}

.pills {
  display: flex;
  gap: 12px;
}

.pill {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(222,209,20,.1);
  color: #DED114;
  border: 1px solid rgba(222,209,20,.2);
  letter-spacing: 0.5px;
}

.domain {
  font-size: 15px;
  font-weight: 600;
  color: #514e5c;
  letter-spacing: 1px;
}

/* Decorative dots */
.dots {
  position: absolute;
  right: 90px;
  top: 80px;
  display: grid;
  grid-template-columns: repeat(5, 8px);
  gap: 12px;
  z-index: 1;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(222,209,20,.08);
}
.dot.bright {
  background: rgba(222,209,20,.25);
}
</style>
</head>
<body>
<div class="og">
  <div class="top-line"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot bright"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot bright"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot bright"></div><div class="dot"></div><div class="dot"></div><div class="dot bright"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot bright"></div>
  </div>

  <div class="content">
    <div class="logo-area">
      <div class="logo-ring">
        <img src="y2y_logo.png" alt="Y2Y">
      </div>
    </div>
    <div class="text-content">
      <div class="brand-tag">Y2Y Hungary</div>
      <div class="title">up<span>2</span>date</div>
      <div class="tagline">maradj képben.</div>
      <div class="desc">Globális HR-trendek, kutatások, vezetési szemlélet — rövid magyar összefoglalóval. Minden nap.</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="pills">
      <span class="pill">Napi frissítés</span>
      <span class="pill">AI-összefoglalók</span>
      <span class="pill">20+ forrás</span>
    </div>
    <div class="domain">y2y.hu</div>
  </div>
</div>
</body>
</html>
